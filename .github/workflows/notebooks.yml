name: Notebook result check

on:
  pull_request:
    paths:
      - "notebooks/**"
      - "src/**"
      - "scripts/extract_notebook_plots.py"
      - "scripts/update_notebook_results.sh"
      - "docs/qsvt/tutorial_results.md"
      - "docs/qsvt/real_example_results.md"
      - "docs/qsvt/benchmark_results.md"
      - "results/tables/real_examples_plot_manifest.csv"
      - "results/tables/benchmark_plot_manifest.csv"
      - "tests/test_real_example_notebooks.py"
      - "pyproject.toml"
      - ".github/workflows/notebooks.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  execute:
    runs-on: ubuntu-latest

    env:
      MPLCONFIGDIR: /tmp/matplotlib

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and test dependencies
        run: python -m pip install -e ".[test]"

      - name: Execute notebooks
        run: pytest -m notebook tests/test_real_example_notebooks.py

      - name: Verify notebook execution preserved committed artifacts
        run: git diff --exit-code -- results/benchmarks results/tables

      - name: Check generated notebook result pages
        run: |
          python scripts/extract_notebook_plots.py --preset all --write-docs
          git diff --exit-code -- docs/qsvt/tutorial_results.md docs/qsvt/real_example_results.md docs/qsvt/benchmark_results.md results/tables/real_examples_plot_manifest.csv results/tables/benchmark_plot_manifest.csv
