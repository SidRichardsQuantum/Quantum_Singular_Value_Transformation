name: Publish

on:
  push:
    tags:
      - "v*"

permissions:
  actions: read
  contents: read

jobs:
  verify-release-checks:
    runs-on: ubuntu-latest

    outputs:
      run-id: ${{ steps.checks.outputs.run-id }}
      tag: ${{ steps.checks.outputs.tag }}

    steps:
      - name: Require green Ordered Actions for tagged commit
        id: checks
        uses: actions/github-script@v8
        with:
          script: |
            const tag = context.ref.replace("refs/tags/", "");
            const { data: tagRef } = await github.rest.git.getRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `tags/${tag}`,
            });

            let taggedSha = tagRef.object.sha;
            if (tagRef.object.type === "tag") {
              const { data: annotatedTag } = await github.rest.git.getTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_sha: tagRef.object.sha,
              });
              taggedSha = annotatedTag.object.sha;
            }

            const { data: runs } = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: "ordered-actions.yml",
              event: "push",
              per_page: 100,
            });

            const matchingRuns = runs.workflow_runs
              .filter((run) => run.head_sha === taggedSha)
              .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            if (matchingRuns.length === 0) {
              core.setFailed(
                `No Ordered Actions push run was found for ${taggedSha}. ` +
                  `Push the commit to main and wait for Ordered Actions to pass before tagging ${tag}.`,
              );
              return;
            }

            const latestRun = matchingRuns[0];
            if (latestRun.status !== "completed") {
              core.setFailed(
                `Latest Ordered Actions run for ${taggedSha} is ${latestRun.status}; ` +
                  `wait for it to complete before publishing ${tag}.`,
              );
              return;
            }

            if (latestRun.conclusion !== "success") {
              core.setFailed(
                `Latest Ordered Actions run for ${taggedSha} concluded ${latestRun.conclusion}; ` +
                  `publishing ${tag} is blocked until the commit checks are green.`,
              );
              return;
            }

            core.info(`Publishing ${tag} from green Ordered Actions run ${latestRun.id}.`);
            core.setOutput("run-id", String(latestRun.id));
            core.setOutput("tag", tag);

  publish:
    runs-on: ubuntu-latest
    needs: verify-release-checks

    permissions:
      actions: read
      contents: read
      id-token: write

    environment:
      name: pypi

    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-artifacts
          path: dist/
          run-id: ${{ needs.verify-release-checks.outputs.run-id }}
          github-token: ${{ github.token }}

      - name: Publish ${{ needs.verify-release-checks.outputs.tag }} to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
