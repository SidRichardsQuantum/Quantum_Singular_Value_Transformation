name: pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      MPLCONFIGDIR: /tmp/matplotlib
      PYTHONUTF8: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Install package + docs/notebook deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,docs]"

      - name: Verify committed notebook result artefacts
        run: |
          python scripts/extract_notebook_plots.py --preset all --write-docs
          git diff --exit-code -- docs/qsvt/tutorial_results.md docs/qsvt/real_example_results.md docs/qsvt/benchmark_results.md results/tables/real_examples_plot_manifest.csv results/tables/benchmark_plot_manifest.csv

      - name: Build docs
        run: |
          python -m sphinx -W -b html docs docs/_build/html

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
