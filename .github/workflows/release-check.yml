name: Release Check

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install release and docs dependencies
        run: python -m pip install -e ".[release,docs]"

      - name: Build documentation with warnings as errors
        run: python -m sphinx -W -b html docs docs/_build/html

      - name: Build distribution artifacts
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*
