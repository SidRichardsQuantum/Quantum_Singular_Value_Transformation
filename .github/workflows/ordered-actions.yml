name: Ordered Actions

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and lint/type dependencies
        run: python -m pip install -e ".[lint,type]"

      - name: Run Ruff
        run: ruff check .

      - name: Check Black formatting
        run: black --check .

      - name: Run mypy
        run: mypy src/qsvt

  tests:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: python -m pip install -e ".[test]"

      - name: Run pytest
        run: pytest -m "not notebook and not integration" --cov=qsvt --cov-report=term-missing --cov-report=xml

      - name: Upload coverage XML artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  dependency-compatibility:
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: py310-min-supported
            python-version: "3.10"
            numpy-constraint: "numpy>=1.23,<2"
            pennylane-constraint: "pennylane>=0.42,<0.43"
          - name: py313-current-supported
            python-version: "3.13"
            numpy-constraint: "numpy>=2,<3"
            pennylane-constraint: "pennylane>=0.45,<0.46"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and constrained dependencies
        run: |
          python -m pip install -e ".[test]"
          python -m pip install "${{ matrix.numpy-constraint }}" "${{ matrix.pennylane-constraint }}"

      - name: Run compatibility smoke tests
        run: pytest -m "not notebook" tests/test_qsvt_smoke.py tests/test_execution.py tests/test_hhl_execution.py tests/test_block_encoding.py tests/test_algorithm_workflow_regressions.py tests/test_reports.py

  integration:
    runs-on: ubuntu-latest
    needs: [tests, dependency-compatibility]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and test dependencies
        run: python -m pip install -e ".[test]"

      - name: Run cookbook integration tests
        run: pytest -m integration tests/test_cookbook_examples.py

  pages:
    runs-on: ubuntu-latest
    needs: integration

    env:
      MPLCONFIGDIR: /tmp/matplotlib
      PYTHONUTF8: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml

      - name: Install package + docs/notebook deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,docs]"

      - name: Execute notebooks
        run: pytest -m notebook tests/test_real_example_notebooks.py

      - name: Verify committed notebook result artefacts
        run: |
          python scripts/extract_notebook_plots.py --preset all --write-docs
          git diff --exit-code -- docs/qsvt/tutorial_results.md docs/qsvt/real_example_results.md docs/qsvt/benchmark_results.md results/tables/real_examples_plot_manifest.csv results/tables/benchmark_plot_manifest.csv

      - name: Build docs
        run: |
          python -m sphinx -W -b html docs docs/_build/html

  package:
    runs-on: ubuntu-latest
    needs: pages

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package tooling
        run: python -m pip install -e ".[release]"

      - name: Build distribution artifacts
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Smoke-test built wheel
        run: python scripts/release_check.py --wheel-smoke-only

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-artifacts
          path: dist/
