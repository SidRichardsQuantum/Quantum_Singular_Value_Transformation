name: Tests

on:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test dependencies
        run: python -m pip install -e ".[test]"

      - name: Run pytest
        run: pytest -m "not notebook and not integration" --cov=qsvt --cov-report=term-missing --cov-report=xml

      - name: Upload coverage XML artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  integration:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package and test dependencies
        run: python -m pip install -e ".[test]"

      - name: Run cookbook integration tests
        run: pytest -m integration tests/test_cookbook_examples.py

  dependency-compatibility:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: py310-min-supported
            python-version: "3.10"
            numpy-constraint: "numpy>=1.23,<2"
            pennylane-constraint: "pennylane>=0.42,<0.43"
          - name: py313-current-supported
            python-version: "3.13"
            numpy-constraint: "numpy>=2,<3"
            pennylane-constraint: "pennylane>=0.45,<0.46"

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and constrained dependencies
        run: |
          python -m pip install -e ".[test]"
          python -m pip install "${{ matrix.numpy-constraint }}" "${{ matrix.pennylane-constraint }}"

      - name: Run compatibility smoke tests
        run: pytest -m "not notebook" tests/test_qsvt_smoke.py tests/test_execution.py tests/test_hhl_execution.py tests/test_block_encoding.py
